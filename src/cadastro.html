<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Floricultura</title>
    <link rel="stylesheet" href="Cadastro.style.css">
</head>
<body>
     <a href="login.html"></a>
    <div class="container">
        <h1>🌷 Cadastro</h1>

        <form id="cadastroForm">
            <label>Nome completo</label>
            <input type="text" id="fullName" name="fullName" placeholder="Digite seu nome:" pattern="^[A-Za-zá-úÁ-Ú\s]+$" required>
            <br>
            <div id="welcome"></div>
            <label>Email</label>
            <input type="email" id="email" name="email" placeholder="exemplo@gmail.com" required>
            <br>
            <label>Telefone</label>
            <input type="tel"id="phone" name="phone"placeholder="(00) 00000-0000"required inputmode="numeric" pattern="[0-9]*" maxlength="11"oninput=" this.value = this.value.replace(/\D/g, '')">
            <br>
            <label>Endereço</label>
            <input type="text" id="address" name="address" placeholder="Digite seu endereço">
            <br>
            <label>Senha</label>
            <div class="password-field">
                <input type="password" id="password" name="password" placeholder="Crie uma senha" required minlength="8">
                <button type="button" class="toggle-password" data-target="password" aria-label="Mostrar senha">👁️</button>
            </div>
            <br>
            <label>Confirmar senha</label>
            <div class="password-field">
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirme sua senha" required minlength="8">
                <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Mostrar confirmação de senha">👁️</button>
            </div>
            <div id="passwordMatchMessage" class="match-message"></div>
            <button type="submit">Cadastrar</button>
             <p><a href="index.html"></a></p>
        </form>

    </div>
   
 <script src="cadastro.script.js"></script>
</body>
</html>
