<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Floricultura</title>
    <link rel="stylesheet" href="Cadastro.style.css">
</head>
<body>

    <div class="container">
        <h1>🌷 Cadastro</h1>

        <form>
            <label>Nome completo</label>
            <input type="text:" placeholder="Digite seu nome:" required>
            <br>
            <label>Email</label>
            <input type="email" placeholder="Digite seu email:" required>
            <br>
            <label>Telefone</label>
            <input type="tel" placeholder="(00) 00000-0000" required>
            <br>
            <label>Endereço</label>
            <input type="text" placeholder="Digite seu endereço">
            <br>
            <label>Senha</label>
            <input type="password" placeholder="Crie uma senha" required minlength="8">
            <br>
            <label>Confirmar senha</label>
            <input type="password" placeholder="Confirme sua senha" required minlength="8">
            <br>
            <button type="submit">Cadastrar</button>

        </form>

        <p>Já tem conta? <a href="login.index.html">Entrar</a></p>
    </div>
<script src="cadastro.script.js"></script>
</body>
</html>
