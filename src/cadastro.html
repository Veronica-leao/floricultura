<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Floricultura</title>
    <link rel="stylesheet" href="Cadastro.style.css">
</head>
<body>

    <div class="container">
        <h1>🌷 Cadastro</h1>

        <form id="cadastroForm">
            <label>Nome completo</label>
            <input type="text" id="fullName" name="fullName" placeholder="Digite seu nome:" required>
            <br>
            <label>Email</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email:" required>
            <br>
            <label>Telefone</label>
            <input type="tel" id="phone" name="phone" placeholder="(00) 00000-0000" required inputmode="numeric" pattern="[0-9]*">
            <br>
            <label>Endereço</label>
            <input type="text" id="address" name="address" placeholder="Digite seu endereço">
            <br>
            <label>Senha</label>
            <input type="password" id="password" name="password" placeholder="Crie uma senha" required minlength="8">
            <br>
            <label>Confirmar senha</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirme sua senha" required minlength="8">
            <br>
            <button type="submit">Cadastrar</button>
             <p>Já tem conta? <a href="login.index.html">Entrar</a></p>
             <p><a href="index.html">Voltar para Início</a></p>
        </form>

    </div>
<script src="cadastro.script.js"></script>
</body>
</html>
